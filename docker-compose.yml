version: '3.3'

services:
  presenton:
    image: ghcr.io/presenton/presenton:latest
    container_name: presenton
    restart: unless-stopped
    ports:
      - "5001:80"
    volumes:
      - /home/usdaw/presenton/app_data:/app_data
      - /home/usdaw/presenton/public/images:/app/servers/nextjs/public/images
      - /home/usdaw/presenton/servers/fastapi/services/llm_client.py:/app/servers/fastapi/services/llm_client.py
      - /home/usdaw/presenton/servers/fastapi/models/sql/metrics.py:/app/servers/fastapi/models/sql/metrics.py
      - /home/usdaw/presenton/servers/fastapi/api/main.py:/app/servers/fastapi/api/main.py
      - /home/usdaw/presenton/servers/fastapi/api/v1/monitoring.py:/app/servers/fastapi/api/v1/monitoring.py
      - /home/usdaw/presenton/servers/fastapi/utils/rate_limiter.py:/app/servers/fastapi/utils/rate_limiter.py
      - /home/usdaw/presenton/servers/fastapi/utils/request_queue.py:/app/servers/fastapi/utils/request_queue.py
      - /home/usdaw/presenton/servers/fastapi/utils/quota_monitor.py:/app/servers/fastapi/utils/quota_monitor.py
      - /home/usdaw/presenton/servers/fastapi/utils/model_monitor.py:/app/servers/fastapi/utils/model_monitor.py
      - /home/usdaw/presenton/servers/fastapi/utils/available_models.py:/app/servers/fastapi/utils/available_models.py
    environment:
      # LLM Provider - Custom for Ollama Cloud
      - LLM=custom
      
      # Ollama Cloud Configuration - Using gemma3:4b
      - CUSTOM_LLM_URL=https://ollama.com/api
      - CUSTOM_LLM_API_KEY=cdb37febc63b484188b4063116f0546a.lHNVyoIB8DbBUqCLnmwsWXcm
      - CUSTOM_MODEL=gemma3:4b
      
      # Model Generation Settings
      - DISABLE_THINKING=true
      - EXTENDED_REASONING=false
      - TOOL_CALLS=false
      - WEB_GROUNDING=false
      
      # Image Generation - Disabled for now (no free provider key configured)
      - DISABLE_IMAGE_GENERATION=true
      - IMAGE_PROVIDER=pexels
      
      # Disable LLM-based generation to allow manual presentation creation
      - DISABLE_GENERATION=true
      - GENERATION_DISABLED=true
      - SKIP_GENERATION=true
      
      # General Configuration
      - CAN_CHANGE_KEYS=false
      - LOG_LEVEL=DEBUG
      - PYTHONUNBUFFERED=1
      
      # Optional: Add these after getting free API keys
      # - DISABLE_IMAGE_GENERATION=false
      # - PEXELS_API_KEY=<your-pexels-key-when-ready>
      # OR
      # - PIXABAY_API_KEY=<your-pixabay-key-when-ready>
